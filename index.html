<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./styles/landing-page.css" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Miuu Note</title>
  </head>
  <body>
    <div id="background">
      <img src="./assets/background.png" class="stretch" alt="" />
    </div>
    <div class="container">
      <div class="row">
        <div class="col left-container">
          <img src="./assets/favicon.png" class="app-icon" />

          <h1 class="miuu-note-title display-1">Miuu Note</h1>
          <h2>A Cute Diary with Lock</h2>
          <p>
            Miuu note-a cute & secure diary with cute mood stickers. Express
            thoughts daily!
          </p>
          <a
            href="https://play.google.com/store/apps/details?id=com.miuustudio.miuudiary"
          >
            <img src="./assets/google-play-badge.png" class="google-play-badge"
          /></a>
        </div>
        <div class="col-md-auto">
          <img src="./assets/main-image.png" class="main-image" />
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
